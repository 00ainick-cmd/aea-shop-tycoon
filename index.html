<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AEA Member Shop Tycoon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{ --bay:#0d131b; --steel:#1b2632; --rivet:#2c3a49; --edge:#070b10; --hi:#44566a;
    --amber:#ffb028; --amber-dk:#a96e10; --scope:#36e0a0; --beacon:#ff5a5f; --sky:#5cc6ff; --violet:#c792ff; --paper:#f3ede0; --ink:#ecf3fb; --muted:#8ea3ba; --caution:#ffd23f; }
  *{box-sizing:border-box} html{ -webkit-text-size-adjust:100%; scrollbar-width:none; } html::-webkit-scrollbar{ display:none; }
  body{ margin:0; background:var(--bay); background-image:radial-gradient(120% 80% at 50% -10%, #1d3350 0%, #0d131b 55%);
    color:var(--ink); font-family:'VT323',ui-monospace,monospace; font-size:21px; line-height:1.25; -webkit-font-smoothing:none;
    min-height:100vh; min-height:100dvh; display:flex; justify-content:center; padding:10px; }
  body::after{ content:""; position:fixed; inset:0; pointer-events:none; z-index:9000; background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, transparent 1px 3px); mix-blend-mode:multiply; opacity:.5; }
  .pix{ font-family:'Press Start 2P',monospace; }
  .app{ width:100%; max-width:480px; display:flex; flex-direction:column; gap:8px; min-height:calc(100dvh - 20px); overflow-x:clip; padding-bottom:calc(84px + env(safe-area-inset-bottom)); }
  .panel{ background:var(--steel); border:3px solid var(--edge); border-radius:7px; box-shadow: inset 0 0 0 3px var(--rivet), inset 0 0 0 6px var(--steel), 0 6px 0 rgba(0,0,0,.45); padding:12px; overflow-wrap:break-word; min-width:0; }
  .titlebar{ background:linear-gradient(180deg,#2b62a6,#1b2632); border:3px solid var(--edge); border-radius:7px; box-shadow: inset 0 0 0 2px #4a7fc4, 0 4px 0 rgba(0,0,0,.45); padding:9px 12px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .titlebar .t{ font-size:11px; color:#dbe9ff; letter-spacing:.5px; min-width:0; overflow-wrap:break-word; word-break:break-all; }
  #hudwrap{ width:100%; min-width:0; max-width:100%; }
  #hud{ display:flex; align-items:stretch; gap:6px; width:100%; }
  #hud .cell{ flex:1; background:var(--steel); border:3px solid var(--edge); border-radius:6px; box-shadow: inset 0 0 0 2px var(--rivet); padding:7px 5px; text-align:center; min-width:0; }
  #hud .lab{ font-family:'Press Start 2P',monospace; font-size:7px; color:var(--muted); display:block; margin-bottom:5px; letter-spacing:.3px; }
  #hud .val{ font-family:'Press Start 2P',monospace; font-size:11px; color:var(--ink); overflow-wrap:break-word; word-break:break-all; }
  #hud .val.cash{ color:var(--scope); } #hud .val.rep{ color:var(--amber); } #hud .val.neg{ color:var(--beacon); }
  #soundbtn{ background:var(--steel); border:3px solid var(--edge); border-radius:6px; box-shadow: inset 0 0 0 2px var(--rivet); width:44px; flex:none; cursor:pointer; color:var(--ink); display:flex; align-items:center; justify-content:center; padding:0; }
  .seasonbar{ display:flex; align-items:center; gap:8px; padding:7px 11px; border:3px solid var(--edge); border-radius:7px; margin-bottom:6px; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.10), 0 4px 0 rgba(0,0,0,.4); max-width:100%; overflow:hidden; }
  .seasonbar .sb-season{ font-family:'Press Start 2P',monospace; font-size:9px; letter-spacing:1px; color:#fff; text-shadow:1px 1px 0 rgba(0,0,0,.5); white-space:nowrap; flex-shrink:0; min-width:0; }
  .seasonbar .sb-date{ font-family:'Press Start 2P',monospace; font-size:8px; color:rgba(255,255,255,0.92); white-space:nowrap; flex-shrink:1; min-width:0; overflow:hidden; text-overflow:ellipsis; }
  .seasonbar .sb-note{ font-family:'Press Start 2P',monospace; font-size:7px; margin-left:auto; padding:5px 7px; border-radius:4px; background:rgba(0,0,0,0.34); color:#fff; flex-shrink:1; white-space:nowrap; min-width:0; overflow:hidden; text-overflow:ellipsis; }
  .s-winter{ background:linear-gradient(180deg,#2f5680,#16273c); }
  .s-spring{ background:linear-gradient(180deg,#2f8f5a,#16402a); }
  .s-summer{ background:linear-gradient(180deg,#cf9a2a,#6a4a10); }
  .s-fall{ background:linear-gradient(180deg,#b86a2a,#4a2814); }
  .specgrid{ display:grid; grid-template-columns:1fr 1fr; gap:7px; }
  .speccell{ background:#16202b; border:3px solid var(--edge); border-radius:6px; box-shadow: inset 0 0 0 2px var(--rivet); padding:8px; }
  .speccell .specname{ font-family:'Press Start 2P',monospace; font-size:6px; color:var(--muted); letter-spacing:.3px; line-height:1.6; }
  .speccell .specrank{ display:inline-block; margin-top:5px; font-family:'Press Start 2P',monospace; font-size:6px; padding:3px 5px; border-radius:3px; border:2px solid var(--edge); }
  .spectag{ display:inline-block; font-family:'Press Start 2P',monospace; font-size:6px; padding:3px 5px; border-radius:3px; border:2px solid var(--edge); background:#16202b; color:var(--muted); }
  .hangarwrap .wave{ animation:wave 1.8s linear infinite; }
  @keyframes wave{ 0%{ transform:translateX(0); } 100%{ transform:translateX(-8px); } }
  #soundbtn svg{ display:block; }
  #stage{ display:flex; flex-direction:column; gap:10px; min-height:0; min-width:0; width:100%; }
  h2.scrn{ font-family:'Press Start 2P',monospace; font-size:12px; color:var(--amber); margin:2px 0; letter-spacing:.5px; line-height:1.5; overflow:hidden; max-width:100%; }
  .sub{ color:var(--muted); font-size:19px; }
  .eratag{ display:inline-block; font-family:'Press Start 2P',monospace; font-size:7px; padding:4px 6px; border-radius:4px; border:2px solid var(--edge); background:#16202b; color:var(--sky); }
  .hangarwrap{ border:3px solid var(--edge); border-radius:7px; overflow:hidden; box-shadow: inset 0 0 0 3px var(--rivet); background:#0a0f15; }
  .hangarwrap svg{ display:block; width:100%; height:auto; }
  .hangarwrap .tarm{ transform-box:fill-box; transform-origin:50% 0%; animation:work-arm .62s ease-in-out infinite; }
  .hangarwrap .spark{ animation:work-spark .9s steps(1) infinite; opacity:0; }
  .hangarwrap .fly{ animation:fly-by linear infinite; }
  .hangarwrap .cloud{ animation:drift 36s linear infinite; }
  .hangarwrap .sock{ transform-box:fill-box; transform-origin:0% 50%; animation:sway 3.2s ease-in-out infinite; }
  .hangarwrap .beacon{ animation:beacon-blink 1.1s steps(1) infinite; }
  .hangarwrap .lamp{ animation:lamp-flick 4s ease-in-out infinite; }
  @keyframes work-arm{ 0%,100%{ transform:rotate(3deg); } 50%{ transform:rotate(-15deg); } }
  @keyframes work-spark{ 0%,62%,100%{ opacity:0; } 72%{ opacity:1; } 84%{ opacity:.4; } }
  @keyframes fly-by{ 0%{ transform:translateX(-44px); } 100%{ transform:translateX(212px); } }
  @keyframes drift{ 0%{ transform:translateX(-34px); } 100%{ transform:translateX(202px); } }
  @keyframes sway{ 0%,100%{ transform:rotate(-7deg); } 50%{ transform:rotate(8deg); } }
  @keyframes beacon-blink{ 0%,60%{ opacity:.25; } 70%,100%{ opacity:1; } }
  @keyframes lamp-flick{ 0%,100%{ opacity:.82; } 50%{ opacity:1; } }
  .card{ background:#16202b; border:3px solid var(--edge); border-radius:6px; box-shadow: inset 0 0 0 2px var(--rivet); padding:10px; cursor:pointer; display:flex; gap:10px; align-items:center; transition:transform .05s, box-shadow .1s; }
  .card:hover{ box-shadow: inset 0 0 0 2px var(--hi); } .card:active{ transform:translateY(2px); }
  .card.sel{ box-shadow: inset 0 0 0 2px var(--scope), 0 0 0 2px var(--scope); }
  .card.flat{ cursor:default; } .card.flat:active{ transform:none; }
  .card .ico{ width:56px; height:42px; flex:none; display:flex; align-items:center; justify-content:center; }
  .card .ico svg{ width:100%; height:100%; }
  .card .body{ flex:1; min-width:0; overflow:hidden; }
  .card .nm{ font-family:'Press Start 2P',monospace; font-size:9px; color:var(--ink); line-height:1.5; overflow-wrap:break-word; word-break:break-word; }
  .card .ds{ color:var(--muted); font-size:18px; margin-top:3px; overflow-wrap:break-word; }
  .row2{ display:flex; gap:8px; align-items:center; margin-top:6px; flex-wrap:wrap; }
  .badge{ font-family:'Press Start 2P',monospace; font-size:7px; padding:5px 6px; border-radius:4px; border:2px solid var(--edge); letter-spacing:.5px; }
  .b-amazing{ background:var(--scope); color:#062018; } .b-solid{ background:var(--sky); color:#06243a; } .b-risky{ background:var(--amber); color:#2a1a00; } .b-dead{ background:var(--beacon); color:#2a0405; }
  .pay{ font-family:'Press Start 2P',monospace; font-size:9px; color:var(--scope); margin-left:auto; }
  .reason{ color:var(--muted); font-size:17px; margin-top:4px; font-style:italic; }
  .cred{ font-family:'Press Start 2P',monospace; font-size:6px; padding:3px 5px; border-radius:3px; border:2px solid var(--edge); letter-spacing:.3px; }
  .c0{ background:#28333f; color:#a9bcd0; } .c1{ background:var(--sky); color:#06243a; } .c2{ background:var(--violet); color:#1e0a35; } .c3{ background:var(--amber); color:#2a1700; }
  .bay-empty{ border-style:dashed; border-color:var(--hi); background:#11181f; opacity:.92; }
  .bay-empty .nm{ color:var(--muted); }
  .bay-ready{ box-shadow: inset 0 0 0 2px var(--scope), 0 0 0 2px var(--scope); }
  .baynum{ font-family:'Press Start 2P',monospace; font-size:7px; color:var(--muted); }
  .qmeter{ height:9px; background:#0a0f15; border:2px solid var(--edge); border-radius:3px; overflow:hidden; margin-top:6px; }
  .qmeter > div{ height:100%; background:linear-gradient(90deg,var(--amber-dk),var(--scope)); }
  .dots{ display:flex; gap:4px; margin-top:6px; }
  .d{ width:11px; height:11px; border:2px solid var(--edge); background:#28333f; border-radius:3px; } .d.done{ background:var(--scope); }
  .stats{ display:grid; grid-template-columns:1fr 1fr; gap:3px 12px; margin-top:6px; }
  .stat{ display:flex; align-items:center; gap:6px; font-size:18px; color:var(--muted); }
  .stat b{ color:var(--ink); font-family:'Press Start 2P',monospace; font-size:8px; width:30px; text-align:right; }
  .pips{ display:flex; gap:2px; } .pip{ width:6px; height:11px; background:#28333f; border:1px solid #0a0f15; } .pip.on{ background:var(--amber); }
  .qbar{ margin:9px 0; }
  .qbar .qt{ display:flex; justify-content:space-between; font-family:'Press Start 2P',monospace; font-size:8px; margin-bottom:5px; }
  .qbar .qv{ color:var(--ink); }
  .track{ height:16px; background:#0a0f15; border:2px solid var(--edge); border-radius:3px; box-shadow: inset 0 0 0 1px #20303d; overflow:hidden; }
  .fill{ height:100%; width:0%; transition:width .5s cubic-bezier(.2,.8,.2,1); }
  .f-work{ background:linear-gradient(90deg,var(--amber-dk),var(--amber)); } .f-diag{ background:linear-gradient(90deg,#159e6e,var(--scope)); }
  .f-comp{ background:linear-gradient(90deg,#2b7fb8,var(--sky)); } .f-fin{ background:linear-gradient(90deg,#7c4fb0,var(--violet)); }
  .l-work{ color:var(--amber); } .l-diag{ color:var(--scope); } .l-comp{ color:var(--sky); } .l-fin{ color:var(--violet); }
  .opt{ width:100%; text-align:left; background:#16202b; border:3px solid var(--edge); border-radius:6px; box-shadow: inset 0 0 0 2px var(--rivet); padding:13px; color:var(--ink); font-family:'VT323',monospace; font-size:20px; cursor:pointer; margin-bottom:9px; line-height:1.25; min-height:54px; }
  .opt:hover{ box-shadow: inset 0 0 0 2px var(--hi); } .opt:active{ transform:translateY(2px); }
  .opt.good{ box-shadow: inset 0 0 0 3px var(--scope); background:#0f2a20; } .opt.bad{ box-shadow: inset 0 0 0 3px var(--beacon); background:#2a1213; } .opt:disabled{ cursor:default; opacity:.55; }
  .opt .ok{ font-family:'Press Start 2P',monospace; font-size:9px; color:var(--amber); }
  .opt .t{ display:block; font-family:'Press Start 2P',monospace; font-size:9px; color:var(--ink); line-height:1.55; margin-bottom:6px; }
  .opt .sml{ display:block; opacity:.8; }
  .segwrap{ margin-top:12px; } .seglab{ font-family:'Press Start 2P',monospace; font-size:8px; color:var(--muted); margin-bottom:7px; letter-spacing:.3px; }
  .segrow{ display:flex; gap:7px; }
  .seg{ flex:1; min-height:56px; border:3px solid var(--edge); background:#0e2233; color:var(--ink); font-family:'Press Start 2P',monospace; font-size:8px; border-radius:7px; box-shadow: inset 0 0 0 2px var(--rivet); padding:8px 4px; cursor:pointer; line-height:1.45; }
  .seg:active{ transform:translateY(2px); } .seg.on{ border-color:var(--amber); background:rgba(255,194,40,0.18); box-shadow: inset 0 0 0 2px var(--amber-dk); }
  .squawk-head{ border:3px solid var(--beacon); border-radius:7px; background:#26171a; padding:12px; box-shadow: inset 0 0 0 2px #5a2a2c; }
  .squawk-head .s1{ font-family:'Press Start 2P',monospace; font-size:9px; color:var(--beacon); letter-spacing:.5px; margin-bottom:8px; }
  .squawk-head .s2{ font-size:21px; color:#ffd9da; }
  .explain{ background:#0f2a20; border:3px solid var(--scope); border-radius:7px; padding:11px; font-size:19px; color:#cfeede; box-shadow: inset 0 0 0 2px #1a4a38; margin-top:4px; }
  .explain.miss{ background:#26171a; border-color:var(--beacon); color:#ffd9da; box-shadow: inset 0 0 0 2px #5a2a2c; }
  .hf-head{ border:3px solid var(--caution); border-radius:7px; background:#2a2410; padding:12px; box-shadow: inset 0 0 0 2px #5a5020; }
  .hf-head .h2{ font-size:21px; color:#fff4d6; }
  .infobox{ background:#2a2410; border:3px solid var(--caution); border-radius:7px; padding:11px; font-size:19px; color:#fff4d6; box-shadow: inset 0 0 0 2px #5a5020; margin-top:4px; }
  .reviewer{ display:flex; align-items:center; gap:10px; background:#16202b; border:3px solid var(--edge); border-radius:6px; box-shadow: inset 0 0 0 2px var(--rivet); padding:10px; margin-bottom:7px; min-width:0; overflow:hidden; }
  .reviewer .who{ flex:1; min-width:0; } .reviewer .who .rn{ font-family:'Press Start 2P',monospace; font-size:9px; } .reviewer .who .rq{ color:var(--muted); font-size:17px; margin-top:3px; overflow-wrap:break-word; }
  .score{ font-family:'Press Start 2P',monospace; font-size:16px; color:var(--amber); }
  .total{ text-align:center; font-family:'Press Start 2P',monospace; padding:12px; border:3px solid var(--edge); border-radius:7px; box-shadow: inset 0 0 0 2px var(--rivet); background:#16202b; margin-top:4px; }
  .total .tn{ font-size:10px; color:var(--muted); } .total .tv{ font-size:26px; color:var(--scope); margin-top:8px; } .total .hit{ color:var(--amber); font-size:12px; margin-top:10px; animation:pulse .6s infinite alternate; }
  .ledger{ display:flex; justify-content:space-between; align-items:baseline; gap:4px; font-size:18px; color:var(--muted); margin-top:4px; } .ledger b{ color:var(--ink); }
  .payout{ text-align:center; margin-top:8px; } .payout .pl{ font-family:'Press Start 2P',monospace; font-size:8px; color:var(--muted); } .payout .pv{ font-family:'Press Start 2P',monospace; font-size:20px; color:var(--scope); margin-top:7px; }
  #bar{ position:fixed; left:50%; transform:translateX(-50%); bottom:0; width:100%; max-width:480px; display:flex; gap:8px; z-index:50; padding:14px 10px calc(10px + env(safe-area-inset-bottom)); background:linear-gradient(180deg, rgba(13,19,27,0) 0%, var(--bay) 34%); }
  #bar:empty{ display:none; }
  .btn{ flex:1; font-family:'Press Start 2P',monospace; font-size:10px; line-height:1.5; background:linear-gradient(180deg,#33455a,#1c2733); color:var(--ink); border:3px solid var(--edge); border-radius:7px; box-shadow: inset 0 0 0 2px var(--hi), 0 5px 0 var(--edge); padding:14px 8px; cursor:pointer; min-height:50px; }
  .btn:active{ transform:translateY(3px); box-shadow: inset 0 0 0 2px var(--hi), 0 2px 0 var(--edge); } .btn:disabled{ opacity:.4; cursor:default; transform:none; }
  .btn-go{ background:linear-gradient(180deg,#3fe6a8,#159e6e); color:#062018; box-shadow: inset 0 0 0 2px #9bf2d3, 0 5px 0 #0a4a34; } .btn-go:active{ box-shadow: inset 0 0 0 2px #9bf2d3, 0 2px 0 #0a4a34; }
  .btn-amber{ background:linear-gradient(180deg,#ffc758,#c47f12); color:#2a1700; box-shadow: inset 0 0 0 2px #ffe2a3, 0 5px 0 #6b440a; } .btn-amber:active{ box-shadow: inset 0 0 0 2px #ffe2a3, 0 2px 0 #6b440a; }
  .tokens{ display:flex; align-items:center; gap:8px; justify-content:center; font-family:'Press Start 2P',monospace; font-size:8px; color:var(--muted); margin:2px 0; }
  .tok{ width:13px; height:18px; background:var(--amber); border:2px solid var(--edge); border-radius:2px; } .tok.spent{ background:#28333f; }
  .note{ color:var(--muted); font-size:18px; text-align:center; } .hint{ color:var(--amber); font-size:18px; } .evtext{ font-size:21px; color:var(--ink); line-height:1.3; }
  .chief{ border-left:4px solid var(--amber); padding-left:10px; font-size:21px; color:#ffe6b8; line-height:1.35; }
  #toast{ position:fixed; left:50%; bottom:calc(96px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(40px); opacity:0; background:#16202b; border:3px solid var(--amber); border-radius:7px; box-shadow: inset 0 0 0 2px var(--rivet), 0 6px 0 rgba(0,0,0,.5); padding:12px 16px; font-family:'Press Start 2P',monospace; font-size:9px; color:var(--amber); z-index:9999; transition:.3s; max-width:90vw; text-align:center; line-height:1.6; white-space:pre-line; }
  #toast.show{ transform:translateX(-50%) translateY(0); opacity:1; }
  .title-hero{ text-align:center; padding:8px 4px 4px; }
  .title-hero .kick{ font-family:'Press Start 2P',monospace; font-size:8px; color:var(--sky); letter-spacing:1px; overflow-wrap:break-word; word-break:break-word; }
  .title-hero .big{ font-family:'Press Start 2P',monospace; font-size:18px; color:var(--amber); line-height:1.7; text-shadow:0 3px 0 #6b440a; margin-top:10px; }
  .title-hero .small{ font-family:'Press Start 2P',monospace; font-size:8px; color:var(--muted); margin-top:12px; letter-spacing:.5px; overflow-wrap:break-word; word-break:break-word; }
  .blink{ animation:blink 1.1s steps(1) infinite; } @keyframes blink{ 50%{ opacity:0; } } @keyframes pulse{ to{ filter:brightness(1.5); } }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } .hangarwrap .spark{ opacity:0; } }

  /* ---- Mobile responsiveness: 430px step ---- */
  @media (max-width:430px){
    body{ padding:6px; }
    .seasonbar{ gap:4px; padding:5px 7px; }
    .seasonbar .sb-season{ font-size:7px; }
    .seasonbar .sb-date{ font-size:6px; }
    .seasonbar .sb-note{ font-size:5px; padding:3px 5px; white-space:nowrap; }
    #hud{ gap:4px; }
    #hud .cell{ padding:5px 3px; }
    #hud .lab{ font-size:6px; margin-bottom:3px; }
    #hud .val{ font-size:9px; }
    #soundbtn{ width:36px; min-width:36px; flex:none; }
    h2.scrn{ font-size:10px; }
    .card{ padding:8px; gap:7px; }
    .card .ico{ width:44px; height:36px; }
    .card .nm{ font-size:8px; }
    .badge{ font-size:6px; padding:4px 5px; }
    .pay{ font-size:8px; }
    .btn{ font-size:8px; padding:12px 6px; }
    .title-hero .big{ font-size:16px; }
    .title-hero .kick{ font-size:7px; }
  }

  /* ---- Mobile responsiveness: 390px step ---- */
  @media (max-width:390px){
    body{ padding:4px; }
    .seasonbar .sb-season{ font-size:6px; }
    .seasonbar .sb-date{ font-size:5px; }
    .seasonbar .sb-note{ font-size:5px; max-width:90px; overflow:hidden; text-overflow:ellipsis; }
    #hud .lab{ font-size:5px; }
    #hud .val{ font-size:8px; }
    #soundbtn{ width:32px; min-width:32px; }
    #soundbtn svg{ width:18px; height:16px; }
    .card .ico{ width:38px; height:30px; }
    .card .nm{ font-size:7px; }
    .btn{ font-size:7px; padding:11px 5px; }
    .title-hero .big{ font-size:14px; }
    .cust-card .cc-detail{ font-size:15px; overflow-wrap:break-word; word-break:break-word; }
  }

  /* ---- Mobile responsiveness: 380px step (preserve existing intent + strengthen) ---- */
  @media (max-width:380px){
    body{ font-size:19px; }
    .title-hero .big{ font-size:13px; }
    #hud .val{ font-size:7px; }
    #hud .lab{ font-size:5px; }
    #hud .cell{ padding:4px 2px; }
    #soundbtn{ width:30px; min-width:30px; }
    #soundbtn svg{ width:16px; height:14px; }
    .card{ padding:6px; gap:5px; }
    .card .ico{ width:34px; height:28px; }
    .card .nm{ font-size:6px; }
    .row2{ gap:4px; margin-top:4px; }
    .badge{ font-size:5px; padding:3px 4px; }
    .pay{ font-size:7px; }
    .btn{ font-size:6px; padding:10px 4px; }
  }

  /* ---- Prevent long single-line strings from forcing width ---- */
  .cc-detail{ overflow-wrap:break-word; word-break:break-word; }
  .row2{ flex-wrap:wrap; }
  .cust-card .cc-row{ flex-wrap:wrap; }

/* ---- HELPERS ---- */
var $=function(s,r){ return (r||document).querySelector(s); };
function money(n){ return (n<0?'-$':'$')+Math.abs(Math.round(n)).toLocaleString('en-US'); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function rnd(x){ return Math.round(x); }
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }
function bayCount(){ return [0,1,2,3,4,5][STATE.level]; }
function crewSlots(){ return [0,2,4,5,6,7][STATE.level]; }
function bestStat(k){ var m=0; STATE.crew.forEach(function(c){ if(c[k]>m) m=c[k]; }); return m; }
function avgSkill(c){ return (c.wiring+c.integ+c.trouble+c.paper)/4; }
function canCertify(c){ var n=c.cred+1; return n<=3 && avgSkill(c)>=CRED_SKILL[n]; }
function skillCost(v){ return 1000 + rnd(v)*200; }
function credName(c){ return ['Apprentice','CAET','CAET Advanced','Master'][c]||'Apprentice'; }
function credCls(c){ return 'c'+c; }
function pips(v){ var n=clamp(rnd(v),0,10); var h=''; for(var i=0;i<10;i++) h+='<span class="pip'+(i<n?' on':'')+'"></span>'; return '<span class="pips">'+h+'</span>'; }
function unlockedAircraft(){ return Object.keys(AIRCRAFT).filter(function(k){ return AIRCRAFT[k].lvl<=STATE.level; }); }
function unlockedJobs(){ return Object.keys(JOBS).filter(function(k){ return JOBS[k].era<=STATE.era; }); }
function pickSquawk(){ return SQUAWKS[pick(unlockedJobs())]||SQUAWKS.generic; }
function freeCrew(){ var r=[]; STATE.crew.forEach(function(c,i){ if(c.bay===null) r.push(i); }); return r; }
function toast(msg){ var el=$('#toast'); el.innerHTML=msg; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){ el.classList.remove('show'); },2800); }
function ipBays(fn){ STATE.bays.forEach(function(b){ if(b.job && b.shiftsDone<b.shiftsNeed) fn(b); }); }
function nudge(dim,amt){ ipBays(function(b){ b.bars[dim]=Math.max(0,b.bars[dim]+amt); }); }

SCREENS.quote=function(){
  var pj=STATE.pendingJob, ct=ctype(pj.ctype), cha=STATE.charisma||3;
  if(!pj.qsel) pj.qsel={gear:'standard', cons:'standard'};
  var oem=JOB_OEM[pj.j], dt=oem?dealerTier(oem):0;
  var base=Math.round(JOBS[pj.j].pay*AIRCRAFT[pj.a].tier*FITMULT[pj.fit]*rateMult()*((STATE.adsbRush>0&&pj.j==='adsb')?1.15:1)*waveMult(pj.j));
  var gearStd=oem?Math.round(base*0.35):Math.round(base*0.12);
  var consStd=Math.round(base*0.12), feeAmt=oem?Math.round(base*0.03):0;
  var labor=base-gearStd-consStd-feeAmt;
  var gearMul={budget:0.8,standard:1.0,premium:1.5}, consMul={lean:0.6,standard:1.0,padded:1.5};
  var gear=Math.round(gearStd*(oem?gearMul[pj.qsel.gear]:1)), cons=Math.round(consStd*consMul[pj.qsel.cons]);
  var total=labor+gear+cons+feeAmt;
  var kickback=(oem&&dt>0&&pj.qsel.gear==='premium')?Math.round(gear*(OEMS[oem].margin[dt]-1)):0;
  var ceiling=Math.round(base*ct.tol*(1+(pj.interest||40)/200)*(1+cha*0.01));
  var ratio=total/ceiling, mood=ratio<=0.93?{c:'var(--scope)',t:'They like the number.'}:(ratio<=1.0?{c:'var(--amber)',t:'Right at their limit.'}:{c:'var(--beacon)',t:'Over budget. Trim it or sell harder.'});
  var warmth=Math.round((pj.interest||40)/10);
  var hrRate=Math.round(95*rateMult()), hrs=Math.max(1,Math.round(labor/hrRate));
  var gearLbl={budget:'their budget pick',standard:'standard line',premium:'premium upsell'}[pj.qsel.gear];
  var consLbl={lean:'lean estimate',standard:'standard',padded:'padded'}[pj.qsel.cons];
  function group(label,grp,opts,sel){ var b=opts.map(function(o){ var on=o.k===sel; return '<button class="seg'+(on?' on':'')+'" data-q="'+grp+'" data-v="'+o.k+'">'+o.label+'</button>'; }).join(''); return '<div class="segwrap"><div class="seglab">'+label+'</div><div class="segrow">'+b+'</div></div>'; }
  var html='<h2 class="scrn">BUILD THE QUOTE</h2>'
   +'<div class="panel"><div class="nm pix" style="font-size:8px;color:var(--amber)">'+pj.owner+' \u2022 '+JOBS[pj.j].name+'</div><div class="sub" style="margin-top:6px">Customer warmth '+pips(warmth)+'</div></div>';
  if(oem) html+=group('Avionics line ('+OEMS[oem].name+(dt>0?', you are a '+TIER_NAME[dt]:', not your dealer yet')+')','gear',[{k:'budget',label:'BUDGET'},{k:'standard',label:'STANDARD'},{k:'premium',label:'PREMIUM'}],pj.qsel.gear);
  html+=group('Consumables estimate','cons',[{k:'lean',label:'LEAN'},{k:'standard',label:'STANDARD'},{k:'padded',label:'PADDED'}],pj.qsel.cons);
  html+='<div class="panel" style="margin-top:10px">'
   +'<div class="ledger"><span>Labor ('+hrs+' hrs @ '+money(hrRate)+'/hr)</span><b>'+money(labor)+'</b></div>'
   +(oem?'<div class="ledger"><span>Avionics ('+gearLbl+')</span><b>'+money(gear)+'</b></div>':'<div class="ledger"><span>Shop-supplied materials</span><b>'+money(gear)+'</b></div>')
   +'<div class="ledger"><span>Consumables ('+consLbl+')</span><b>'+money(cons)+'</b></div>'
   +(feeAmt>0?'<div class="ledger"><span>Dealer fee</span><b>'+money(feeAmt)+'</b></div>':'')
   +(kickback>0?'<div class="ledger"><span>Your '+OEMS[oem].name+' kickback</span><b style="color:var(--scope)">+'+money(kickback)+'</b></div>':'')
   +'<div class="payout"><div class="pl">QUOTE TOTAL</div><div class="pv">'+money(total)+'</div></div></div>'
   +'<div class="sub" style="margin-top:8px;color:'+mood.c+'">'+mood.t+'</div>';
  return { html:html,
    actions:[ {label:'WALK AWAY', on:function(){ go('floor'); }}, {label:'SEND QUOTE \u25BA', cls:'btn-go', on:function(){
        if(total<=ceiling){ pj.quote={total:total,parts:cons,kickback:kickback,gear:pj.qsel.gear,oem:oem};
          var pf=0; if(ratio<=0.85) pf+=0.5; else if(ratio>=0.99) pf-=0.2;
          if(pj.ctype==='budget'){ if(pj.qsel.gear==='premium') pf-=1; else if(pj.qsel.gear==='budget') pf+=0.5; if(pj.qsel.cons==='padded') pf-=0.5; }
          else if(pj.ctype==='status'){ if(pj.qsel.gear==='premium') pf+=0.3; else if(pj.qsel.gear==='budget') pf-=0.3; }
          else if(pj.ctype==='safety'){ if(pj.qsel.cons==='lean') pf-=0.2; }
          pj.priceFair=clamp(pf,-1,1);
          sHit(); toast('Sold. The ticket is yours.'); go('assign'); }
        else { sBad(); toast('They balked at the price. Trim it or talk them up.'); } }} ],
    init:function(){ document.querySelectorAll('button[data-q]').forEach(function(el){ el.onclick=function(){ pj.qsel[el.dataset.q]=el.dataset.v; sTab(); go('quote'); }; }); } };

function gainFor(c,mult){ var pf=0.55+0.45*((c.power||100)/100); var tool=STATE.auths.tooling?1.08:1;
  var cw=STATE.courses.wiring?1.10:1, cc=STATE.courses.compliance?1.10:1;
  return { work:(c.wiring*3+c.integ*1.4)*mult*pf*tool*cw, diag:(c.trouble*3+c.wiring*0.5)*mult*pf*tool, comp:(c.paper*3+c.integ*0.5)*mult*pf*tool*cc, fin:(c.integ*3+c.wiring*0.5)*mult*pf*tool }; }
function gainXP(c,job){ var w=job.w, tot=w.work+w.diag+w.comp+w.fin, base=0.40, map={work:'wiring',diag:'trouble',comp:'paper',fin:'integ'}, lbl={wiring:'Wiring',trouble:'Troubleshooting',paper:'Paperwork',integ:'Integration'};
  ['work','diag','comp','fin'].forEach(function(dim){ var k=map[dim], b4=Math.floor(c[k]); c[k]=Math.min(10, c[k]+ base*(w[dim]/tot)); if(Math.floor(c[k])>b4){ STATE._otj=(STATE._otj||[]); STATE._otj.push(c.name+' leveled up '+lbl[k]); } });
  c.lastTrain=STATE.week; }
function runShift(){
  var advanced=false, nudged=null;
  STATE.bays.forEach(function(bay){ if(bay.job && bay.crew.length && bay.shiftsDone<bay.shiftsNeed){
    var bestCred=Math.max.apply(null,bay.crew.map(function(ci){ return STATE.crew[ci].cred; }));
    var credPen=bestCred<(JOBS[bay.job.j].credReq||0)?0.7:1; var mult=FITMULT[bay.job.fit]*credPen*specEdge(bay.job.j);
    var oem=JOB_OEM[bay.job.j]; if(oem && bay.crew.some(function(ci){ return STATE.crew[ci].oemCerts&&STATE.crew[ci].oemCerts[oem]; })) mult*=1.12;
    if(STATE.courses.pitot && (bay.job.j==='cert'||bay.job.j==='xpdr')) mult*=1.08;
    if(STATE.courses.cyber && (bay.job.j==='datalink'||bay.job.j==='traffic')) mult*=1.08;
    bay.crew.forEach(function(ci){ var c=STATE.crew[ci], g=gainFor(c,mult), j=0.9+Math.random()*0.2; bay.bars.work+=g.work*j; bay.bars.diag+=g.diag*j; bay.bars.comp+=g.comp*j; bay.bars.fin+=g.fin*j; c.power=clamp((c.power||100)-12,15,100); gainXP(c,JOBS[bay.job.j]); });
    bay.shiftsDone++; advanced=true;
  }});
  if(!advanced){ toast('Staff a bay with a job first.'); return; }
  var overworked=0; STATE.crew.forEach(function(c){ if(c.bay!==null && (c.power||100)<=40) overworked++; });
  if(overworked>0) STATE.culture=clamp(STATE.culture - overworked*0.7, cultureFloor(), 100);
  STATE.crew.forEach(function(c){ if(canCertify(c) && (c.elig||0) < c.cred+1){ c.elig=c.cred+1; if(!nudged) nudged=c.name; } });
  STATE.week++; tickDemandWave(STATE); sRatchet(); sPing(1); renderHUD();
  if(nudged) toast(nudged+" is ready to certify.\nSee Training.");
  if(STATE._otj && STATE._otj.length){ toast(STATE._otj.slice(0,2).join(' / ')); STATE._otj=[]; }
  endShift();
}

  /* Random human-factors popups are a rejected pattern. Safety now lands as a
     consequence of player choices (rushing, overtime, weak culture) and in the
     reviews customers leave, not as a random interruption. */

function score10(w,tgt){ return clamp(Math.round(w/(tgt||REVIEW_TARGET)*10),1,10); }
function bayTarget(bay){ return REVIEW_TARGET*(((bay&&bay.shiftsNeed)||4)/4); }
function weightedBy(bars,w){ var s=0,t=0; for(var k in w){ s+=bars[k]*w[k]; t+=w[k]; } return s/t; }
function computeScores(bayIdx, squawkOk){
  var bay=STATE.bays[bayIdx], j=JOBS[bay.job.j], tgt=bayTarget(bay);
  var cust=clamp(Math.round(score10(weightedBy(bay.bars,j.w),tgt)-rateExpect()),1,10);
  var insp=score10(weightedBy(bay.bars,{comp:1.6,work:1.2,fin:0.5,diag:0.4}),tgt);
  var pilot=clamp(score10(weightedBy(bay.bars,{fin:1.5,work:1,diag:0.8,comp:0.4}),tgt)+(squawkOk?1:-1),1,10);
  var total=cust+insp+pilot, mult=FITMULT[bay.job.fit];
  var q=bay.job.quote; var payout = q ? Math.round(q.total*(0.85+total/30*0.30)) : Math.round(previewPay(bay.job.a,bay.job.j,bay.job.fit)*(0.5+total/30*0.9));
  STATE.scores={cust:cust,insp:insp,pilot:pilot,total:total,hit:total>=24,squawkOk:squawkOk};
  STATE.lastPayout=payout; STATE._repGain=Math.max(1,Math.round((total-12)*mult));
}
/* ---- Phase F1: line-item invoice builder ---- */
/* All fields in parts are PRE-SIGNED: positive = income, negative = cost.
   Callers must negate costs before passing (e.g. parts: -partsCost). */
function buildInvoice(parts){
  var lines=[];
  /* Labor is always present */
  lines.push({label:'Labor', amt: parts.labor||0});
  /* Parts and consumables */
  if((parts.parts||0)!==0) lines.push({label:'Parts', amt: parts.parts});
  /* Dealer fee */
  if((parts.dealerFee||0)>0) lines.push({label:'Dealer fee', amt: parts.dealerFee});
  /* Premium kickback */
  if((parts.kickback||0)>0) lines.push({label:'Premium kickback', amt: parts.kickback});
  /* Unexpected job hit */
  if((parts.hit||0)!==0) lines.push({label: parts.hitLabel||'Job hit', amt: parts.hit});
  /* Shop overhead since last job */
  if((parts.overhead||0)!==0) lines.push({label:'Shop overhead', amt: parts.overhead});
  /* Net is the sum of all amounts */
  var net=0; lines.forEach(function(l){ net+=l.amt; });
  return {lines:lines, net:net};
}

function collect(){
  var idx=STATE.activeBay, bay=STATE.bays[idx];
  /* --- the heartbeat: the customer leaves a review based on how the job actually ran --- */
  var cust=ensureCustomer(bay.owner, bay.job.a, bay.job.ctype||'budget');
  var rv=computeReview(jobOutcome(bay), cust);
  var acName=AIRCRAFT[bay.job.a]?AIRCRAFT[bay.job.a].name:bay.job.a;
  var review={custId:cust.id, cust:cust.name, aircraft:acName, stars:rv.stars, week:STATE.week, answered:false, text:rv.text};
  STATE.reviewsFeed.unshift(review);
  if(STATE.reviewsFeed.length>14) STATE.reviewsFeed=STATE.reviewsFeed.slice(0,14);
  STATE.starRating=starAvg(STATE.reviewsFeed);
  if(STATE.starRating>=4.0 && STATE._seenTips) delete STATE._seenTips.ratingSlip;
  if(STATE._seenTips) delete STATE._seenTips.coldLoyals;
  cust.reviews.push({stars:rv.stars, week:STATE.week, text:rv.text});
  cust.ltv += Math.max(0,STATE.lastPayout); cust.jobsDone++; cust.lastWeek=STATE.week;
  var relBefore=cust.rel;
  if(rv.stars>=4) cust.rel=clamp(cust.rel+1,0,4); else if(rv.stars<=2) cust.rel=clamp(cust.rel-1,0,4);
  var referral=null;
  if(rv.stars>=4 && cust.rel>=3){ STATE.warm=Math.max(STATE.warm||0,18); STATE.hotBoard=true; referral=cust.name; }
  STATE._lastReview={review:review, custId:cust.id, relBefore:relBefore, referral:referral};
  /* --- the single finance moment: settle the invoice --- */
  /* STATE._invoice was built by SCREENS.review and is the sole source of truth for this job's net.
     Cash changes exactly once here. pendingOverhead is inside the invoice so we zero it here too. */
  var invoiceNet = (STATE._invoice && STATE._invoice.net != null) ? STATE._invoice.net : STATE.lastNet;
  STATE.cash += invoiceNet; STATE.pendingOverhead=0; STATE._invoice=null; STATE._jobHit=0; STATE._jobHitLabel=null;
  STATE.lastNet=invoiceNet; /* keep in sync for compatibility */
  STATE.rep+=STATE._repGain; STATE.jobsDone++; STATE.floorPlane=bay.job.a;
  var soldOem=JOB_OEM[bay.job.j]; if(soldOem){ STATE.oemSales[soldOem]=(STATE.oemSales[soldOem]||0)+1; }
  addSpecXP(JOB_SPEC[bay.job.j], STATE.scores&&STATE.scores.hit?12:8);
  if(STATE.culture<45 && Math.random() < (0.45-STATE.culture/100)){ var rw=Math.round(STATE.lastPayout*0.10)+300; STATE.cash-=rw; STATE.rep=Math.max(0,STATE.rep-1); toast('Callback. A squawk came back.\n-'+money(rw)+' \u2022 weak safety culture.'); }
  if(STATE.scores.hit){ STATE.tokens=Math.min(3,STATE.tokens+1); STATE.fans+=1; }
  if(STATE.adsbRush>0) STATE.adsbRush--;
  bay.crew.forEach(function(ci){ STATE.crew[ci].bay=null; STATE.crew[ci].power=100; });
  STATE.bays[idx]=freshBay();
  sCash(); renderHUD();
  STATE.deliverQueue=STATE.deliverQueue.filter(function(b){ return b!==idx; });
  go('custReview');
}
function finishDeliveries(){
  STATE.scores=null;
  if(checkAward()){ go('victory'); return; }
  if(STATE.cash<-4000){ go('gameover'); return; }
  var eraGate={3:2,7:3,12:4};
  if(eraGate[STATE.jobsDone] && STATE.era<eraGate[STATE.jobsDone]){ STATE.pendingEra=eraGate[STATE.jobsDone]; go('eraEvent'); return; }
  if(seasonKey()==='spring' && (STATE.lastShowYear||0) < gYear()){ STATE.lastShowYear=gYear(); startShow(); return; }
  if(seasonKey()==='fall' && (STATE.lastConfYear||0) < gYear() && STATE.crew.length){ STATE.lastConfYear=gYear(); STATE._confSel=[]; go('fallconf'); return; }
  if(STATE.week - STATE.lastStmt >= 4){ accrueOverhead(); }
  if(STATE.week - (STATE.lastPersonnel||0) >= 3 && Math.random()<0.5){ var pr=personnelEvent(); if(pr){ STATE.lastPersonnel=STATE.week; go(pr); return; } }
  if(STATE.cash<1500) toast('Cash is tight.\nKeep the work flowing.');
  if(Math.random()<0.5){ var e=rollEvent(); if(e){ STATE.event=e; go('event'); return; } }
  go('floor');
}

function quarterCosts(){ var rent=[0,600,1400,2800,5000,8000][STATE.level]||600; var payroll=0; STATE.crew.forEach(function(c){ payroll += (c.wage||marketWage(c)); }); if(STATE.courses.business){ rent=Math.round(rent*0.8); payroll=Math.round(payroll*0.8); } var insurance=clamp(Math.round(1200 - STATE.culture*10),300,1300); var fees=0; OEM_ORDER.forEach(function(o){ var t=dealerTier(o); if(t) fees+=OEMS[o].annual[t]; }); return {rent:rent,payroll:payroll,insurance:insurance,fees:fees}; }
function quarterRevenue(){ var grant=0; if(STATE.apprentice&&STATE.grant){ var appr=0; STATE.crew.forEach(function(c){ if(c.cred===0) appr++; }); grant=2500+appr*1200; } return {grant:grant}; }
/* Overhead is the P&L plumbing, kept. But there is no periodic statement popup.
   It accrues silently and settles inside the next Collect Payment invoice, so

function accrueOverhead(){ var co=quarterCosts(), r=quarterRevenue(); var net=r.grant-(co.rent+co.payroll+co.insurance+co.fees); STATE.pendingOverhead=(STATE.pendingOverhead||0)+net; STATE.lastStmt=STATE.week; STATE.culture=clamp(STATE.culture+(STATE.courses.hf?3:1),cultureFloor(),100);
  STATE.crew.forEach(function(c){ var mkt=marketWage(c); var gap=mkt-(c.wage||mkt); var d=1; if(gap>0) d-=Math.min(9,Math.round(gap/110)); else d+=1; if(STATE.culture>=75) d+=2; else if(STATE.culture<45) d-=2; c.loyalty=clamp((c.loyalty==null?70:c.loyalty)+d,0,100); if(STATE.week-(c.lastTrain||0)>40){ ['wiring','integ','trouble','paper'].forEach(function(k){ c[k]=Math.max(2,Math.round((c[k]-0.1)*10)/10); }); } });
  renderHUD(); }
function marketWage(c){ return Math.round(500 + c.cred*350 + avgSkill(c)*60); }

function removeCrew(idx){ STATE.crew.splice(idx,1); STATE.bays.forEach(function(b){ if(b.crew&&b.crew.length){ b.crew=b.crew.filter(function(ci){ return ci!==idx; }).map(function(ci){ return ci>idx?ci-1:ci; }); } }); STATE.sel=[]; }
function personnelEvent(){ if(!STATE.crew.length) return null; var idx=-1, lo=999; STATE.crew.forEach(function(c,i){ if(c.homegrown) return; var L=(c.loyalty==null?70:c.loyalty); if(L<lo){ lo=L; idx=i; } }); if(idx<0) return null; var c=STATE.crew[idx], mkt=marketWage(c), wage=(c.wage||mkt), underpaid=wage<mkt*0.95; if(lo<38){ STATE.personnel={idx:idx,type:'poach',offer:Math.round(Math.max(mkt,wage)*1.18)}; return 'personnel'; } if(lo<60 && underpaid && Math.random()<0.6){ STATE.personnel={idx:idx,type:'raise',offer:mkt}; return 'personnel'; } return null; }

function awardVals(){ var loyal=0; for(var k in STATE.customers){ if((STATE.customers[k].rel||0)>=3) loyal++; } var adv=0; STATE.crew.forEach(function(c){ if((c.cred||0)>=2) adv++; }); return { starRating:STATE.starRating||0, loyalAccounts:loyal, gradCount:STATE.gradCount||0, advTechs:adv, sumCreds:sumCreds(), culture:STATE.culture||0, dealerScore:sumDealerTiers(), cash:STATE.cash||0, level:STATE.level||0 }; }
function awardParts(s){ var v=s||awardVals();
  var rep = Math.min(30, (v.starRating||0)/5*20 + (v.loyalAccounts||0)*2.2);

/* Phase 4 self-test checks: training currency */
check('currency lapses after a year', function(){ return isLapsed({lastTrain:1}, 60)===true && isLapsed({lastTrain:50}, 60)===false; });
check('lapsed tech blocked from dealer work', function(){ return canDoDealerWork({lastTrain:1}, 60)===false; });

/* Phase 5 self-test checks: demand waves + award reweight */
check('demand wave biases board toward the product domain', function(){
  var withWave = boardBiasWeight('glass', {demandWave:{domain:'glass'}});
  var noWave   = boardBiasWeight('glass', {demandWave:null});
  return withWave > noWave;
});
check('demand wave decrements and clears', function(){
  var s={demandWave:{domain:'glass',weeksLeft:1}}; tickDemandWave(s); return s.demandWave===null;
});
check('award: reputation + workforce dominate', function(){
  var loved = awardScore({starRating:4.8, gradCount:6, culture:90, dealerScore:1, cash:20000});
  var rich  = awardScore({starRating:3.0, gradCount:0, culture:50, dealerScore:1, cash:500000});
  return loved > rich;
});

/* Phase F1 self-test checks: line-item invoice */
check('invoice lines sum to net', function(){
  var inv = buildInvoice({labor:1200, parts:800, dealerFee:150, kickback:200, hit:-300, overhead:-500});
  return inv.net === 1200+800+150+200-300-500 && inv.lines.length>=5;
});
check('invoice formats negative hit as a minus line', function(){
  var inv = buildInvoice({labor:1000, parts:0, dealerFee:0, kickback:0, hit:-450, overhead:0});
  return inv.lines.some(function(l){ return l.amt===-450 && /hit|callback|rush|box|backorder/i.test(l.label)===false ? false : l.amt===-450; });
});

check('halcyon has a job and it maps back', function(){
  return !!JOBS.expglass && JOB_OEM.expglass === 'halcyon' && JOB_SPEC.expglass === 'glass';
});
check('expglass fits experimental aircraft well', function(){ return fitFor('experimental','expglass') === 'amazing'; });

check('level 5 cash gate lowered to 180k', function(){
  var l5 = UPGRADES.filter(function(u){ return u.lvl===5; })[0];
  return l5 && l5.cost === 180000;
});
check('upgrade cash gates strictly increase by level', function(){
  for(var i=1;i<UPGRADES.length;i++){ if(UPGRADES[i].cost <= UPGRADES[i-1].cost) return false; }
  return true;
});
check('specialty edge scales with rank and is capped at +12pct', function(){
  var save=STATE.spec;
  STATE.spec={};            // glass family Unrated (rank 0)
  var lo=specEdge('glass');
  STATE.spec={glass:140};   // glass family Authority (rank 4; SPEC_THRESH[4]=140)
  var hi=specEdge('glass');
  STATE.spec=save;
  return lo===1 && Math.abs(hi-1.12)<1e-9 && hi>lo;
});
check('jobs with no specialty mapping get no edge', function(){ return specEdge('nope_not_a_job')===1; });
check('known customer reuses stored personality, new walk-in is unknown', function(){
  var save=STATE.customers; STATE.customers={};
  ensureCustomer('Test Pilot','piston','status');
  var r = customerPersonality('Test Pilot')==='status' && customerPersonality('Nobody New')===null;
  STATE.customers=save;
  return r;
});

if (location.search.indexOf('test') >= 0) { runSelfTest(); }
else if (location.search.indexOf('screen=') >= 0) { var _m=location.search.match(/screen=([^&]+)/); if(_m){ newBoard(); STATE.screen=decodeURIComponent(_m[1]); } render(); }
else { render(); }
</script>
